AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  Exclude:
    - 'examples/**/*'
    - 'vendor/**/*'

# ── Style: disabled cops ───────────────────────────────────────────────────
Style/StringLiterals:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/RescueModifier:
  Enabled: false

Style/TrivialAccessors:
  Enabled: false

Style/MultilineTernaryOperator:
  Enabled: false

Style/SafeNavigation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Style/RescueStandardError:
  Enabled: false

# Both % and format/sprintf are acceptable
Style/FormatString:
  Enabled: false

# String concatenation and interpolation are both acceptable
Style/StringConcatenation:
  Enabled: false

# ── Layout ─────────────────────────────────────────────────────────────────
Layout/LineLength:
  Max: 140

Layout/ExtraSpacing:
  Enabled: false

Layout/HashAlignment:
  Enabled: false

Layout/FirstHashElementIndentation:
  Enabled: false

Layout/EmptyLineAfterGuardClause:
  Enabled: false

# ── Naming ─────────────────────────────────────────────────────────────────
# Single-char params (e, t) are acceptable throughout
Naming/MethodParameterName:
  Enabled: false

Naming/VariableNumber:
  Exclude:
    - 'test/**/*'

Naming/RescuedExceptionsVariableName:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

Naming/PredicateMethod:
  AllowedMethods:
    - import
  Exclude:
    - 'test/**/*'

# ── Lint ───────────────────────────────────────────────────────────────────
Lint/EmptyBlock:
  Exclude:
    - 'test/**/*'

Lint/UnusedMethodArgument:
  Enabled: false

Lint/ConstantDefinitionInBlock:
  Exclude:
    - 'Rakefile'
    - 'test/**/*'

# ── Gemspec ────────────────────────────────────────────────────────────────
Gemspec/DevelopmentDependencies:
  EnforcedStyle: Gemfile

Gemspec/RequiredRubyVersion:
  Enabled: false

Gemspec/OrderedDependencies:
  Enabled: false

# ── Metrics ────────────────────────────────────────────────────────────────
# Flog is the primary complexity gate — these thresholds catch only
# egregious outliers without false-positiving every dispatch method.

Metrics/MethodLength:
  Max: 35
  CountAsOne:
    - heredoc
    - array
    - hash
  Exclude:
    - 'test/**/*'

Metrics/AbcSize:
  Max: 40
  Exclude:
    - 'test/**/*'

Metrics/ClassLength:
  Max: 300
  Exclude:
    - 'test/**/*'

Metrics/ModuleLength:
  Max: 200
  Exclude:
    - 'test/**/*'

Metrics/CyclomaticComplexity:
  Max: 20
  Exclude:
    - 'test/**/*'

Metrics/PerceivedComplexity:
  Max: 20
  Exclude:
    - 'test/**/*'

Metrics/ParameterLists:
  Enabled: false

Metrics/BlockLength:
  Max: 60
  Exclude:
    - 'Rakefile'
    - '*.gemspec'
    - 'test/**/*'
